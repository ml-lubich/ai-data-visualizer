<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Data Visualizer</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="https://cdn.bokeh.org/bokeh/release/bokeh-3.6.2.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.bokeh.org/bokeh/release/bokeh-api-3.6.2.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <h1>AI Data Visualizer</h1>
    <p class="subtitle">Upload your data, ask a question, and get a chart</p>
  </header>

  <main>
    <section id="data-panel">
      <h2>1. Upload Data</h2>
      <div id="upload-area">
        <label for="file-input" class="upload-label">
          Choose a CSV file or drag &amp; drop
        </label>
        <input type="file" id="file-input" accept=".csv" />
      </div>
      <div id="data-preview" class="hidden">
        <h3>Data Preview <span id="data-info"></span></h3>
        <div id="table-container"></div>
      </div>
    </section>

    <section id="chat-panel">
      <h2>2. Ask for a Visualization</h2>
      <div id="chat-messages"></div>
      <form id="chat-form">
        <input
          type="text"
          id="chat-input"
          placeholder="e.g. Show me a bar chart of sales by region"
          autocomplete="off"
        />
        <button type="submit" id="send-btn">Send</button>
      </form>
    </section>

    <section id="viz-panel">
      <h2>3. Visualization</h2>
      <div id="chart-output">
        <p class="placeholder-text">Your chart will appear here</p>
      </div>
    </section>
  </main>

  <footer>
    <p>Powered by BokehJS &amp; AI &mdash; <a href="https://github.com/ml-lubich/ai-data-visualizer">GitHub</a></p>
  </footer>

  <script src="/js/app.js"></script>
</body>
</html>
