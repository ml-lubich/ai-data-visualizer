<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Data Visualizer - 10 Canonical Examples</title>
    <script src="https://cdn.plot.ly/plotly-3.4.0.min.js" charset="utf-8"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; background: #041638; color: #F0F2F8;
        height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

      #app { display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        max-width: 1100px; width: 100%; margin: 0 auto; padding: 0.75rem 1rem; }

      header { text-align: center; margin-bottom: 0.5rem; flex-shrink: 0; }
      .header-brand { display: flex; align-items: center; justify-content: center; gap: 0.6rem; }
      .logo { height: 24px; }
      header h1 { font-size: 1.2rem; color: #fff; font-weight: 600; }
      header p { color: #5BBAD5; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.03em; }

      .nav { display: flex; gap: 0.4rem; justify-content: center; flex-wrap: wrap;
        margin-bottom: 0.5rem; flex-shrink: 0; }
      .nav button { padding: 0.3rem 0.7rem; border: 1px solid #0C2A5E; border-radius: 0.375rem;
        background: #071E4A; color: #8BA3D4; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; }
      .nav button:hover { border-color: #073AB8; color: #F0F2F8; }
      .nav button.active { background: #073AB8; color: #fff; border-color: #073AB8; }

      .example-info { background: #071E4A; border: 1px solid #0C2A5E; border-radius: 0.5rem;
        padding: 0.6rem 1rem; margin-bottom: 0.5rem; flex-shrink: 0; }
      .example-info h2 { font-size: 0.95rem; color: #5BBAD5; margin-bottom: 0.25rem; }
      .example-info .question { color: #F0F2F8; font-size: 0.85rem; }
      .example-info .interactions { color: #34D399; font-size: 0.75rem; margin-top: 0.2rem; }

      #visualization-target { background: #071E4A; border: 1px solid #0C2A5E;
        border-radius: 0.5rem; padding: 0.5rem;
        flex: 1; min-height: 0; position: relative; overflow: hidden; }

      #visualization-target .js-plotly-plot {
        position: absolute !important;
        top: 0.5rem; left: 0.5rem; right: 0.5rem; bottom: 0.5rem;
        width: auto !important; height: auto !important;
      }
      #visualization-target .js-plotly-plot .plot-container,
      #visualization-target .js-plotly-plot .plot-container .svg-container {
        width: 100% !important; height: 100% !important;
      }

      .controls { display: flex; gap: 0.75rem; justify-content: center;
        margin-top: 0.5rem; flex-shrink: 0; }
      .controls button { padding: 0.45rem 1.2rem; border: none; border-radius: 0.375rem;
        background: #073AB8; color: #fff; font-size: 0.85rem; cursor: pointer; font-weight: 500; }
      .controls button:hover { background: #1A52D4; }
      .controls button:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <div class="header-brand">
          <img src="/public/polaris-logo.svg" alt="Polaris Wireless" class="logo" />
          <h1>AI Data Visualizer</h1>
        </div>
        <p>AIGIS Platform - 10 Interactive Chart Examples</p>
      </header>

      <div class="nav" id="nav-buttons"></div>

      <div class="example-info" id="example-info">
        <h2 id="example-type"></h2>
        <div class="question" id="example-question"></div>
        <div class="interactions" id="example-interactions"></div>
      </div>

      <div id="visualization-target"></div>

      <div class="controls">
        <button id="prev-btn" onclick="navigate(-1)">Previous</button>
        <button id="next-btn" onclick="navigate(1)">Next</button>
      </div>
    </div>

    <script type="module">
      import { CANONICAL_EXAMPLES } from "/src/examples/canonical-examples.js";
      import Papa from "papaparse";

      let currentIndex = 0;
      let chartData = [];

      async function loadData() {
        const resp = await fetch("/sample_data/sales.csv");
        const text = await resp.text();
        const result = Papa.parse(text, { header: true, skipEmptyLines: true, dynamicTyping: true });
        chartData = result.data;
        window.__chartData = chartData;
      }

      function fitCharts() {
        const target = document.getElementById("visualization-target");
        if (!target) return;
        const rect = target.getBoundingClientRect();
        const w = Math.floor(rect.width - 16);
        const h = Math.floor(rect.height - 16);
        if (w <= 0 || h <= 0) return;
        const plots = target.querySelectorAll(".js-plotly-plot");
        for (const plot of plots) {
          Plotly.relayout(plot, { width: w, height: h, autosize: false });
          Plotly.Plots.resize(plot);
        }
      }

      function renderExample(index) {
        currentIndex = index;
        const ex = CANONICAL_EXAMPLES[index];

        document.getElementById("example-type").textContent = ex.id + ": " + ex.type;
        document.getElementById("example-question").textContent = '"' + ex.question + '"';
        document.getElementById("example-interactions").textContent = "Interactions: " + ex.interactions;

        document.querySelectorAll(".nav button").forEach((btn, i) => {
          btn.classList.toggle("active", i === index);
        });

        document.getElementById("prev-btn").disabled = index === 0;
        document.getElementById("next-btn").disabled = index === CANONICAL_EXAMPLES.length - 1;

        window.__chartData = chartData;
        const target = document.getElementById("visualization-target");
        target.innerHTML = "";

        try {
          const fn = new Function(ex.code);
          fn();
          requestAnimationFrame(fitCharts);
        } catch (err) {
          target.innerHTML = '<div style="color:#ef4444;padding:2rem;">Error: ' + err.message + '</div>';
        }
      }

      window.navigate = function(dir) {
        const next = currentIndex + dir;
        if (next >= 0 && next < CANONICAL_EXAMPLES.length) {
          renderExample(next);
        }
      };

      let resizeTimer = null;
      window.addEventListener("resize", () => {
        if (resizeTimer) clearTimeout(resizeTimer);
        resizeTimer = setTimeout(fitCharts, 150);
      });

      async function init() {
        await loadData();
        const nav = document.getElementById("nav-buttons");
        CANONICAL_EXAMPLES.forEach((ex, i) => {
          const btn = document.createElement("button");
          btn.textContent = ex.id;
          btn.onclick = () => renderExample(i);
          nav.appendChild(btn);
        });
        renderExample(0);
      }

      init();
    </script>
  </body>
</html>
