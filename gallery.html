<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Data Visualizer - Gallery | Polaris Wireless</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.plot.ly/plotly-3.4.0.min.js" charset="utf-8"></script>
    <style>
      :root {
        --pw-blue: #073AB8; --pw-blue-light: #1A52D4; --pw-blue-dark: #052D8F;
        --pw-blue-glow: rgba(7,58,184,0.25);
        --pw-navy: #030F28; --pw-navy-surface: #061A3E; --pw-navy-border: #0E2D6A;
        --pw-teal: #5BBAD5; --pw-teal-dim: rgba(91,186,213,0.15);
        --pw-text: #EEF1FA; --pw-text-muted: #7B94C8;
        --pw-success: #34D399;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: "Inter", system-ui, sans-serif; background: var(--pw-navy);
        color: var(--pw-text); height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--pw-navy-border); border-radius: 3px; }

      #app { display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        max-width: 1200px; width: 100%; margin: 0 auto; padding: 0.5rem 0.75rem; }

      header { display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 0.4rem; flex-shrink: 0; }
      .header-left { display: flex; align-items: center; gap: 0.5rem; }
      .logo { height: 22px; opacity: 0.95; }
      header h1 { font-size: 1rem; color: #fff; font-weight: 600; letter-spacing: -0.01em; }
      .badge { font-size: 0.55rem; font-weight: 600; color: var(--pw-teal);
        background: var(--pw-teal-dim); padding: 0.12rem 0.4rem; border-radius: 0.2rem;
        letter-spacing: 0.06em; text-transform: uppercase; }
      header p { color: var(--pw-text-muted); font-size: 0.68rem; }

      .nav { display: flex; gap: 0.3rem; justify-content: center; flex-wrap: wrap;
        margin-bottom: 0.4rem; flex-shrink: 0; }
      .nav button { padding: 0.25rem 0.6rem; border: 1px solid var(--pw-navy-border);
        border-radius: 0.3rem; background: var(--pw-navy-surface); color: var(--pw-text-muted);
        font-family: inherit; font-size: 0.7rem; font-weight: 500; cursor: pointer;
        transition: all 0.2s; }
      .nav button:hover { border-color: var(--pw-blue); color: var(--pw-text); }
      .nav button.active { background: var(--pw-blue); color: #fff; border-color: var(--pw-blue);
        box-shadow: 0 0 10px var(--pw-blue-glow); }

      .example-info { background: var(--pw-navy-surface); border: 1px solid var(--pw-navy-border);
        border-radius: 0.5rem; padding: 0.5rem 0.85rem; margin-bottom: 0.4rem; flex-shrink: 0; }
      .example-info h2 { font-size: 0.85rem; color: var(--pw-teal); font-weight: 600; margin-bottom: 0.15rem; }
      .example-info .question { color: var(--pw-text); font-size: 0.78rem; }
      .example-info .interactions { color: var(--pw-success); font-size: 0.68rem; margin-top: 0.15rem; opacity: 0.8; }

      #visualization-target { background: var(--pw-navy-surface); border: 1px solid var(--pw-navy-border);
        border-radius: 0.5rem; padding: 0.5rem; flex: 1; min-height: 0; position: relative;
        overflow: hidden; transition: border-color 0.4s, box-shadow 0.4s; }
      #visualization-target.has-chart { border-color: var(--pw-blue-dark);
        box-shadow: 0 0 20px var(--pw-blue-glow); }

      #visualization-target .js-plotly-plot {
        position: absolute !important; top: 0.5rem; left: 0.5rem; right: 0.5rem; bottom: 0.5rem;
        width: auto !important; height: auto !important;
        animation: fadeIn 0.4s ease-out; }
      #visualization-target .js-plotly-plot .plot-container,
      #visualization-target .js-plotly-plot .plot-container .svg-container {
        width: 100% !important; height: 100% !important; }

      @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

      .controls { display: flex; gap: 0.5rem; justify-content: center;
        margin-top: 0.4rem; flex-shrink: 0; }
      .controls button { padding: 0.4rem 1rem; border: 1px solid var(--pw-navy-border);
        border-radius: 0.3rem; background: var(--pw-navy-surface); color: var(--pw-text);
        font-family: inherit; font-size: 0.78rem; font-weight: 500; cursor: pointer;
        transition: all 0.2s; }
      .controls button:hover:not(:disabled) { background: var(--pw-blue); border-color: var(--pw-blue); }
      .controls button:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <div class="header-left">
          <img src="/public/polaris-logo.svg" alt="Polaris Wireless" class="logo" />
          <h1>AI Data Visualizer</h1>
          <span class="badge">Gallery</span>
        </div>
        <p>10 Interactive Chart Examples</p>
      </header>

      <div class="nav" id="nav-buttons"></div>

      <div class="example-info" id="example-info">
        <h2 id="example-type"></h2>
        <div class="question" id="example-question"></div>
        <div class="interactions" id="example-interactions"></div>
      </div>

      <div id="visualization-target"></div>

      <div class="controls">
        <button id="prev-btn" onclick="navigate(-1)">Previous</button>
        <button id="next-btn" onclick="navigate(1)">Next</button>
      </div>
    </div>

    <script type="module">
      import { CANONICAL_EXAMPLES } from "/src/examples/canonical-examples.js";
      import Papa from "papaparse";

      let currentIndex = 0;
      let chartData = [];

      async function loadData() {
        const resp = await fetch("/sample_data/sales.csv");
        const text = await resp.text();
        const result = Papa.parse(text, { header: true, skipEmptyLines: true, dynamicTyping: true });
        chartData = result.data;
        window.__chartData = chartData;
      }

      function fitCharts() {
        const target = document.getElementById("visualization-target");
        if (!target) return;
        const rect = target.getBoundingClientRect();
        const w = Math.floor(rect.width - 16);
        const h = Math.floor(rect.height - 16);
        if (w <= 0 || h <= 0) return;
        const plots = target.querySelectorAll(".js-plotly-plot");
        for (const plot of plots) {
          Plotly.relayout(plot, { width: w, height: h, autosize: false });
          Plotly.Plots.resize(plot);
        }
      }

      function renderExample(index) {
        currentIndex = index;
        const ex = CANONICAL_EXAMPLES[index];

        document.getElementById("example-type").textContent = ex.id + ": " + ex.type;
        document.getElementById("example-question").textContent = '"' + ex.question + '"';
        document.getElementById("example-interactions").textContent = ex.interactions;

        document.querySelectorAll(".nav button").forEach((btn, i) => {
          btn.classList.toggle("active", i === index);
        });

        document.getElementById("prev-btn").disabled = index === 0;
        document.getElementById("next-btn").disabled = index === CANONICAL_EXAMPLES.length - 1;

        window.__chartData = chartData;
        const target = document.getElementById("visualization-target");
        target.innerHTML = "";
        target.classList.remove("has-chart");

        try {
          const fn = new Function(ex.code);
          fn();
          target.classList.add("has-chart");
          requestAnimationFrame(fitCharts);
        } catch (err) {
          target.innerHTML = '<div style="color:#F87171;padding:2rem;text-align:center;font-size:0.85rem;">Error: ' + err.message + '</div>';
        }
      }

      window.navigate = function(dir) {
        const next = currentIndex + dir;
        if (next >= 0 && next < CANONICAL_EXAMPLES.length) {
          renderExample(next);
        }
      };

      let resizeTimer = null;
      window.addEventListener("resize", () => {
        if (resizeTimer) clearTimeout(resizeTimer);
        resizeTimer = setTimeout(fitCharts, 150);
      });

      async function init() {
        await loadData();
        const nav = document.getElementById("nav-buttons");
        CANONICAL_EXAMPLES.forEach((ex, i) => {
          const btn = document.createElement("button");
          btn.textContent = ex.id;
          btn.onclick = () => renderExample(i);
          nav.appendChild(btn);
        });
        renderExample(0);
      }

      init();
    </script>
  </body>
</html>
